<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
         :root {
            --cream: #F5EFE0;
            --brown: #2C1810;
            --gold: #C4823A;
            --gold2: #E8A44A;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--cream);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }
        
        #yt-wrap {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 2px;
            height: 2px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
        
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .9s ease;
            background: var(--cream);
            overflow: hidden;
        }
        
        .screen.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: .5;
        }
        /* S1 */
        
        #s1 .bg-word {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: 22vw;
            font-weight: 900;
            color: var(--brown);
            opacity: .04;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }
        
        #s1 .bg-word.t {
            top: -3vw
        }
        
        #s1 .bg-word.b {
            bottom: -3vw
        }
        
        .tap-btn {
            width: 168px;
            height: 168px;
            border-radius: 50%;
            background: var(--brown);
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: pulse 2.2s ease infinite;
            transition: transform .3s;
            z-index: 1;
        }
        
        .tap-btn:hover {
            transform: scale(1.07);
        }
        
        .tap-btn .ico {
            font-size: 46px;
            margin-bottom: 6px;
        }
        
        .tap-btn span {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--cream);
            font-weight: 600;
            text-transform: uppercase;
        }
        
        #s1 .sub {
            margin-top: 28px;
            font-size: 11px;
            letter-spacing: 2.5px;
            color: var(--brown);
            opacity: .35;
            text-transform: uppercase;
            animation: blink 2s ease infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(44, 24, 16, .15);
            }
            50% {
                box-shadow: 0 0 0 22px rgba(44, 24, 16, .08);
            }
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: .35
            }
            50% {
                opacity: .12
            }
        }
        /* S2 Musik */
        
        #s2 {
            background: var(--brown);
        }
        
        #s2::before {
            opacity: .08;
        }
        
        .note-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .fnote {
            position: absolute;
            top: -20px;
            animation: floatUp 3.5s ease-in forwards;
            opacity: 0;
            color: var(--gold);
            font-size: 24px;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(-8deg)
            }
            15% {
                opacity: 1
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) rotate(12deg)
            }
        }
        
        #s2 .lbl {
            font-size: 11px;
            letter-spacing: 5px;
            color: var(--cream);
            opacity: .4;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        #s2 .song {
            font-family: 'Playfair Display', serif;
            font-size: clamp(34px, 10vw, 66px);
            font-weight: 700;
            color: var(--cream);
            text-align: center;
            line-height: 1.1;
        }
        
        #s2 .song em {
            display: block;
            font-style: italic;
            color: var(--gold2);
            font-weight: 400;
        }
        
        #s2 .artist {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            letter-spacing: 4px;
            color: var(--cream);
            opacity: .45;
            margin-top: 8px;
        }
        
        .bars {
            display: flex;
            gap: 5px;
            margin-top: 32px;
            align-items: flex-end;
            height: 42px;
        }
        
        .bar {
            width: 5px;
            border-radius: 3px;
            background: var(--gold);
            animation: beat .7s ease infinite alternate;
        }
        
        @keyframes beat {
            from {
                transform: scaleY(.25)
            }
            to {
                transform: scaleY(1)
            }
        }
        /* S3 Happy Birthday & Love Rain */
        
        .conf-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .love-particle {
            position: absolute;
            top: -20px;
            animation: fall linear forwards;
            opacity: 0;
            color: red;
            font-size: 20px;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }
        
        .conf {
            position: absolute;
            top: -20px;
            border-radius: 2px;
            animation: confFall linear forwards;
            opacity: 0;
        }
        
        @keyframes confFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0)
            }
            100% {
                opacity: 0;
                transform: translateY(110vh) rotate(720deg)
            }
        }
        
        @keyframes fall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0)
            }
            100% {
                opacity: 0;
                transform: translateY(110vh) rotate(360deg)
            }
        }
        
        #s3 .eye {
            font-size: 10px;
            letter-spacing: 6px;
            color: var(--brown);
            opacity: .45;
            text-transform: uppercase;
            margin-bottom: 22px;
            animation: fadeUp 1s ease both;
        }
        
        #s3 .big {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            text-transform: uppercase;
            line-height: .9;
            text-align: center;
        }
        
        #s3 .big .l {
            display: block;
            font-size: clamp(52px, 16vw, 108px);
            color: var(--brown);
        }
        
        #s3 .big .nm {
            display: block;
            font-size: clamp(34px, 10vw, 72px);
            color: var(--gold);
            font-style: italic;
            font-weight: 700;
        }
        
        #s3 .divider {
            width: 56px;
            height: 2px;
            background: var(--gold);
            margin: 22px auto;
        }
        
        #s3 .dt {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            letter-spacing: 3px;
            color: var(--brown);
            opacity: .45;
        }
        /* S4 Gallery */
        
        #s4 {
            justify-content: flex-start;
            padding: 0;
        }
        
        .gallery-header {
            padding: 36px 24px 20px;
            text-align: center;
            flex-shrink: 0;
            width: 100%;
        }
        
        .gallery-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 6vw, 38px);
            font-weight: 700;
            color: var(--brown);
        }
        
        .gallery-header p {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--brown);
            opacity: .35;
            text-transform: uppercase;
            margin-top: 6px;
        }
        
        .slider-wrap {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px 20px;
            position: relative;
        }
        
        .slide-track {
            width: 100%;
            max-width: 340px;
            position: relative;
        }
        
        .slide {
            display: none;
            animation: fadeUp .5s ease both;
            flex-direction: column;
            align-items: center;
        }
        
        .slide.active {
            display: flex;
        }
        
        .slide-img {
            width: 100%;
            aspect-ratio: 4/5;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 12px 40px rgba(44, 24, 16, .18);
            background: #EDE4CF;
            overflow: hidden;
        }
        
        .slide-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .slide-caption {
            margin-top: 14px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-style: italic;
            color: var(--brown);
            opacity: .7;
        }
        
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: none;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .arrow-btn.prev {
            left: -10px;
        }
        
        .arrow-btn.next {
            right: -10px;
        }
        
        .photo-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 14px;
        }
        
        .pdot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--brown);
            opacity: .2;
            transition: all .3s;
            cursor: pointer;
        }
        
        .pdot.on {
            opacity: 1;
            width: 18px;
            border-radius: 3px;
            background: var(--gold);
        }
        /* S5 Cards */
        
        #s5 {
            justify-content: flex-start;
            padding: 40px 20px;
            overflow-y: auto;
        }
        
        #s5::-webkit-scrollbar {
            display: none;
        }
        
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 22px 24px;
            margin-bottom: 14px;
            border-left: 3px solid var(--gold);
            box-shadow: 0 4px 18px rgba(44, 24, 16, .07);
            position: relative;
            animation: fadeUp .7s ease both;
        }
        
        .card .q {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            color: var(--gold);
            opacity: .15;
            position: absolute;
            top: 6px;
            right: 14px;
        }
        
        .card p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px;
            color: var(--brown);
            line-height: 1.7;
            font-style: italic;
        }
        
        .card .from {
            margin-top: 10px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
        }
        /* Global Nav */
        
        #nav {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 999;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--brown);
            opacity: .2;
            transition: all .3s;
            cursor: pointer;
        }
        
        .dot.on {
            opacity: 1;
            width: 24px;
            border-radius: 4px;
        }
        
        .dot.lt {
            background: var(--cream);
        }
        
        #nxt {
            position: fixed;
            bottom: 66px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--brown);
            color: var(--cream);
            border: none;
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(44, 24, 16, .25);
        }
        
        #nxt.lt {
            background: var(--cream);
            color: var(--brown);
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>

    <div id="yt-wrap">
        <div id="yt-player"></div>
    </div>

    <div class="screen active" id="s1">
        <div class="bg-word t">BIRTHDAY</div>
        <div class="bg-word b">BIRTHDAY</div>
        <button class="tap-btn" onclick="goTo(2)">
            <div class="ico">🎵</div>
            <span>Tap to Open</span>
        </button>
        <p class="sub">Scan · Tap · Celebrate</p>
    </div>

    <div class="screen" id="s2">
        <div class="note-wrap" id="noteWrap"></div>
        <p class="lbl">Now Playing</p>
        <h1 class="song">About You<em>The 1975</em></h1>
        <p class="artist">for you</p>
        <div class="bars">
            <div class="bar" style="height:50%"></div>
            <div class="bar" style="height:80%; animation-delay:.1s"></div>
            <div class="bar" style="height:60%; animation-delay:.2s"></div>
            <div class="bar" style="height:90%; animation-delay:.3s"></div>
            <div class="bar" style="height:40%; animation-delay:.4s"></div>
        </div>
    </div>

    <div class="screen" id="s3">
        <div class="conf-wrap" id="loveWrap"></div>
        <div class="conf-wrap" id="confWrap"></div>
        <p class="eye">It's Your Big Day</p>
        <div class="big">
            <span class="l">Happy</span>
            <span class="l">Birthday</span>
            <span class="nm" id="nameEl">An Nisa</span>
        </div>
        <div class="divider"></div>
        <p class="dt" id="dateEl">2 April 2026</p>
    </div>

    <div class="screen" id="s4">
        <div class="gallery-header">
            <h2>Our Memories 📸</h2>
            <p>Moments to remember</p>
        </div>
        <div class="slider-wrap">
            <div class="slide-track" id="photoTrack">
            </div>
            <button class="arrow-btn prev" onclick="prevPhoto()">‹</button>
            <button class="arrow-btn next" onclick="nextPhoto()">›</button>
            <div id="photoDots" class="photo-dots"></div>
        </div>
    </div>

    <div class="screen" id="s5">
        <div style="text-align:center; margin-bottom:20px">
            <h2 style="font-family:'Playfair Display'; color:var(--brown)">For You 💛</h2>
            <p style="font-size:11px; letter-spacing:3px; opacity:.35; color:var(--brown);">With love & wishes</p>
        </div>
        <div id="cardList"></div>
        <div style="height:100px"></div>
    </div>

    <div id="nav">
        <div class="dot on" onclick="goTo(1)"></div>
        <div class="dot" onclick="goTo(2)"></div>
        <div class="dot" onclick="goTo(3)"></div>
        <div class="dot" onclick="goTo(4)"></div>
        <div class="dot" onclick="goTo(5)"></div>
    </div>
    <button id="nxt" onclick="nextScreen()">›</button>

    <script>
        const CONFIG = {
            name: "Hadfina syahida",
            date: "05 April 2026",
            ytVideoId: "tGv7CUutzqU",
            photos: [{
                src: "https://i.imgur.com/0Roi3BV.jpg",
                caption: "✨"
            }, {
                src: "https://i.imgur.com/rxhnPyo.jpg",
                caption: "🌸"
            }, {
                src: "https://i.imgur.com/4syBfH6.jpg",
                caption: "🧡"
            }],
            messages: [{
                text: "Selamat ulang tahun! Kamu adalah sinar matahari yang menerangi hari-hari kami. Semoga kebahagiaan selalu menyertaimu.",
                from: "💛"
            }, {
                text: "Di hari yang spesial ini, ketahuilah betapa berartinya dirimu bagi kami. Tetaplah menjadi dirimu yang luar biasa, tulus, dan penuh kebaikan.",
                from: "✨"
            }, {
                text: "Seiring bertambahnya usia, semoga kamu semakin bijaksana, semakin kuat, dan semakin penuh kasih. Dunia lebih cerah karena adanya dirimu.",
                from: "🌸"
            }, {
                text: "Terima kasih untuk setiap senyum dan kebahagiaan yang kamu bagikan. Semoga setiap langkahmu selalu diberkati dan setiap impianmu terwujud.",
                from: "🎂"
            }, {
                text: "Selamat merayakan hari kelahiranmu. Ketahuilah bahwa kamu sangat dicintai, hari ini dan selamanya.",
                from: "🌟"
            }]
        };

        // Init
        document.getElementById('nameEl').textContent = CONFIG.name;
        document.getElementById('dateEl').textContent = CONFIG.date;

        // Render Photos & Dots
        const track = document.getElementById('photoTrack');
        const pDotsWrap = document.getElementById('photoDots');

        CONFIG.photos.forEach((p, i) => {
            // Build Slide
            const slide = document.createElement('div');
            slide.className = `slide ${i===0?'active':''}`;
            slide.innerHTML = `<div class="slide-img"><img src="${p.src}" onerror="this.src='https://via.placeholder.com/400x500?text=Foto+Error'"></div><p class="slide-caption">${p.caption}</p>`;
            track.appendChild(slide);

            // Build Dot
            const dot = document.createElement('div');
            dot.className = `pdot ${i===0?'on':''}`;
            dot.onclick = () => showPhoto(i);
            pDotsWrap.appendChild(dot);
        });

        // Render Messages
        const cardList = document.getElementById('cardList');
        CONFIG.messages.forEach(m => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<span class="q">"</span><p>${m.text}</p><p class="from">${m.from}</p>`;
            cardList.appendChild(div);
        });

        // --- GLOBAL NAVIGATION ---
        let cur = 1;

        function goTo(n) {
            if (n < 1 || n > 5) return;
            cur = n;

            // Switch screen
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + n).classList.add('active');

            // Switch dots
            const dots = document.querySelectorAll('#nav .dot');
            dots.forEach((d, i) => {
                d.classList.toggle('on', i === (n - 1));
                d.classList.toggle('lt', n === 2); // Light dots for screen 2
            });

            // Switch 'next' button color
            document.getElementById('nxt').classList.toggle('lt', n === 2);

            // Trigger music and notes on screen 2
            if (n === 2) {
                if (ytReady) ytPlayer.playVideo();
                startNotes();
            } else {
                if (ytPlayer && ytReady) ytPlayer.pauseVideo();
            }

            // Trigger effects on screen 3
            if (n === 3) {
                startLoveRain();
                startConfetti();
            }
        }

        function nextScreen() {
            cur = cur < 5 ? cur + 1 : 1;
            goTo(cur);
        }

        // --- PHOTO SLIDER (fixed) ---
        let pIdx = 0;

        function showPhoto(n) {
            pIdx = n;
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.pdot');

            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('on'));

            if (slides[n]) slides[n].classList.add('active');
            if (dots[n]) dots[n].classList.add('on');
        }

        function nextPhoto() {
            pIdx = (pIdx + 1) % CONFIG.photos.length;
            showPhoto(pIdx);
        }

        function prevPhoto() {
            pIdx = (pIdx - 1 + CONFIG.photos.length) % CONFIG.photos.length;
            showPhoto(pIdx);
        }

        // --- YOUTUBE API ---
        let ytPlayer, ytReady = false;
        (function() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
        })();

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', {
                videoId: CONFIG.ytVideoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'playsinline': 1,
                    'loop': 1,
                    'playlist': CONFIG.ytVideoId
                },
                events: {
                    'onReady': () => {
                        ytReady = true;
                    }
                }
            });
        };

        // --- MUSIC NOTES & LOVE RAIN EFFECTS ---
        const fxTimers = {};

        function startNotes() {
            const wrap = document.getElementById('noteWrap');
            clearInterval(fxTimers.notes);
            fxTimers.notes = setInterval(() => {
                if (cur !== 2) {
                    clearInterval(fxTimers.notes);
                    return;
                }
                const n = document.createElement('div');
                n.className = 'fnote';
                n.innerText = ['♪', '♫', '♥', '🎶'][Math.floor(Math.random() * 4)];
                n.style.left = (Math.random() * 80 + 10) + 'vw'; // Avoid edges
                wrap.appendChild(n);
                setTimeout(() => n.remove(), 3500);
            }, 400);
        }

        function startLoveRain() {
            const wrap = document.getElementById('loveWrap');
            for (let i = 0; i < 30; i++) { // Initial burst
                setTimeout(() => {
                    const l = document.createElement('div');
                    l.className = 'love-particle';
                    l.innerText = ['❤️', '💖', '❤️', '💗'][Math.floor(Math.random() * 4)];
                    l.style.left = (Math.random() * 90 + 5) + 'vw';
                    l.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    l.style.fontSize = (Math.random() * 15 + 15) + 'px';
                    wrap.appendChild(l);
                    setTimeout(() => l.remove(), 5000);
                }, i * 100);
            }
        }

        function startConfetti() {
            const wrap = document.getElementById('confWrap');
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'conf';
                    c.style.background = ['var(--gold)', 'var(--gold2)', 'white', '#E2707E'][Math.floor(Math.random() * 4)];
                    c.style.width = (Math.random() * 8 + 5) + 'px';
                    c.style.height = (Math.random() * 8 + 5) + 'px';
                    c.style.left = (Math.random() * 90 + 5) + 'vw';
                    c.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    wrap.appendChild(c);
                    setTimeout(() => c.remove(), 5000);
                }, i * 100);
            }
        }

        // --- SWIPE GESTURES ---
        let tx = 0,
            ty = 0;
        document.addEventListener('touchstart', e => {
            tx = e.touches[0].clientX;
            ty = e.touches[0].clientY;
        });
        document.addEventListener('touchend', e => {
            const dx = tx - e.changedTouches[0].clientX;
            const dy = ty - e.changedTouches[0].clientY;

            // Screen swipe (vertical)
            if (Math.abs(dy) > 100 && Math.abs(dx) < 50) {
                if (dy > 0 && cur < 5) goTo(cur + 1); // Up to next
                if (dy < 0 && cur > 1) goTo(cur - 1); // Down to previous
            }

            // Photo swipe (horizontal, on gallery screen only)
            if (cur === 4 && Math.abs(dx) > 60 && Math.abs(dy) < 50) {
                if (dx > 0) nextPhoto(); // Left to next
                if (dx < 0) prevPhoto(); // Right to previous
            }
        });
    </script>
</body>

</html>
